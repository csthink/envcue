<!--
  EnvCue app-icon source (T5.5) — OUTLINED (font-independent paths; no <text>).
  Concept: the bash variable-expansion token "${ }" with a block terminal cursor
  between the braces = a shell environment variable. Glyphs outlined from
  Menlo-Bold via CoreText. Flat fills, no baked glass — Icon Composer adds the
  Liquid Glass material and the four appearances.

  For Icon Composer: import the FOUR files under layers/ as separate layers
  (bottom -> top): background / braces / dollar / cursor. Do NOT import this
  combined file as a single layer (that double-applies glass over the background
  and looks puffy). $ + cursor are the bright accent (#E3F2FD); braces are the
  mid-blue secondary (#64B5F6); background is the indigo->royal-blue gradient.
-->
